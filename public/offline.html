<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Offline — QiFlow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F9F6F0;
      color: #1A1A1A;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #555; line-height: 1.6; max-width: 280px; }
    .tip {
      margin-top: 1.5rem;
      background: #fff;
      border-left: 3px solid #0D6B6E;
      border-radius: 6px;
      padding: 0.875rem 1rem;
      text-align: left;
      max-width: 300px;
    }
    .tip-label { font-size: 0.625rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #0D6B6E; margin-bottom: 0.25rem; }
    .tip-text { font-size: 0.8125rem; color: #333; line-height: 1.5; }
    button {
      margin-top: 1.5rem;
      background: #0D6B6E;
      color: #fff;
      border: none;
      border-radius: 9999px;
      padding: 0.625rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon" aria-hidden="true">🌿</div>
  <h1>You're offline</h1>
  <p>QiFlow can't reach the internet right now. Your check-ins are safely queued and will sync when you reconnect.</p>

  <div class="tip">
    <p class="tip-label">TCM wisdom for this moment</p>
    <p class="tip-text">When the mind is still, Qi flows freely. Use this moment to breathe deeply and return to yourself.</p>
  </div>

  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
